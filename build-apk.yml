name: Build APK

permissions:
  contents: write

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flet

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Build APK
        run: flet build apk --yes

      - name: Upload APK to Artifacts (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "**/*.apk"

      - name: Publish to GitHub Releases (Fast Download)
        uses: ncipollo/release-action@v1
        with:
          artifacts: "**/*.apk"
          tag: "v1.0.${{ github.run_number }}"
          name: "Bản cập nhật V${{ github.run_number }}"
          body: "Tải file .apk ở phần **Assets** phía dưới cùng để cài đặt lên điện thoại. Tốc độ tải siêu nhanh nhờ CDN!"
          token: ${{ secrets.GITHUB_TOKEN }}
